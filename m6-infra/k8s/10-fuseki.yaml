apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuseki
  namespace: lens-demo
  labels:
    app.kubernetes.io/part-of: counterparty-concentration-lens
    app.kubernetes.io/name: fuseki
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fuseki
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: counterparty-concentration-lens
        app.kubernetes.io/name: fuseki
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: fuseki
          image: stain/jena-fuseki:5.1.0
          args: ["--mem", "--update", "/lens"]
          env:
            - name: ADMIN_PASSWORD
              value: "admin-synthetic-demo-only" # synthetic data; not a secret
          ports:
            - containerPort: 3030
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: fuseki
  namespace: lens-demo
  labels:
    app.kubernetes.io/part-of: counterparty-concentration-lens
spec:
  selector:
    app.kubernetes.io/name: fuseki
  ports:
    - port: 3030
      targetPort: 3030
