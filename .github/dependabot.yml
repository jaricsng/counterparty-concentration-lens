# Dependabot — automated dependency & action update PRs
# Docs: https://docs.github.com/code-security/dependabot

version: 2
updates:
  # Python dependencies (across module requirements files).
  # Add a directory entry per module that has its own requirements.txt.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-deps:
        patterns: ["*"]

  # GitHub Actions used in workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"

  # Docker base images (activates once M6 Dockerfiles exist).
  - package-ecosystem: "docker"
    directory: "/m6-infra/docker"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker)"
# Note: per-module pip directories can be added as the build grows, e.g.:
#   - package-ecosystem: "pip"
#     directory: "/m2-actions"
#     schedule: { interval: "weekly" }
