# Mutation testing — does the test suite actually CATCH bugs, not just cover lines?
# cosmic-ray mutates the core risk-logic modules and checks the tests kill the
# mutants. Report-only (weekly + manual): mutation runs are slow and have
# equivalent-mutant noise, so it's a quality signal, not a per-push merge gate.

name: mutation

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 4 * * 1" # Mondays 04:17 UTC

permissions:
  contents: read

jobs:
  cosmic-ray:
    name: Mutation (cosmic-ray)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12" # cosmic-ray needs Python < 3.13
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          for f in $(find . -name requirements.txt -not -path "./.venv/*"); do pip install -r "$f" || true; done

      - name: Run mutation testing (report-only)
        run: PYTHON=python scripts/run_mutation.sh
