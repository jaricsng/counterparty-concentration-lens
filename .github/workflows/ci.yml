# CI — lint, type, test, security scans, SBOM
# Runs on every push and pull request. Fails the build on any gate.
#
# This is a STARTER. As modules are added, extend the matrix/paths and add
# per-module test/deploy jobs. The container-scan + SBOM jobs activate once
# M6 produces Docker images.

name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, type, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy pytest pip-audit bandit
          # Install module requirements if present (build grows over time)
          for f in $(find . -name requirements.txt); do pip install -r "$f" || true; done

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports

      - name: Tests (pytest)
        run: pytest -q

  # --- Live integration: e2e + FusekiStore + M2 API + BYOD + AppTest clicks ---
  # The same tests skip locally when no Fuseki is reachable; here we stand one up
  # (in-memory, updatable) plus OPA so they actually run.
  integration:
    name: Integration (live Fuseki + OPA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Java (for Fuseki)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          for f in $(find . -name requirements.txt -not -path "./.venv/*"); do pip install -r "$f" || true; done

      - name: Install OPA (M3 policy)
        run: |
          curl -fsSL -o opa \
            "https://github.com/open-policy-agent/opa/releases/download/v1.17.1/opa_linux_amd64_static"
          chmod +x opa && sudo install opa /usr/local/bin/opa
          opa version

      - name: Install gator (M6 admission policy)
        run: |
          GK=v3.22.2
          curl -fsSL -o gator.tgz \
            "https://github.com/open-policy-agent/gatekeeper/releases/download/${GK}/gator-${GK}-linux-amd64.tar.gz"
          tar -xzf gator.tgz gator && sudo install gator /usr/local/bin/gator

      - name: Start Fuseki (in-memory, updatable, /lens on :3030)
        run: |
          curl -fsSL -o fuseki.tgz \
            "https://archive.apache.org/dist/jena/binaries/apache-jena-fuseki-6.1.0.tar.gz"
          tar -xzf fuseki.tgz
          ./apache-jena-fuseki-6.1.0/fuseki-server --mem --update --port 3030 /lens &
          for i in $(seq 1 30); do
            curl -sf 'http://localhost:3030/$/ping' && { echo "Fuseki up"; break; }
            sleep 1
          done

      - name: Tests (full suite against live services)
        env:
          FUSEKI_BASE_URL: "http://localhost:3030"
        run: pytest -q

  security:
    name: Dependency, SAST, secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          # Audit every requirements file; don't fail the whole build on
          # advisory noise during prototyping — review output instead.
          for f in $(find . -name requirements.txt); do
            echo "Auditing $f"; pip-audit -r "$f" || true
          done

      - name: SAST (bandit)
        run: bandit -r . -c pyproject.toml || true

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # --- M6: build images, scan, SBOM ---
  container-scan:
    name: Container image scan + SBOM
    runs-on: ubuntu-latest
    if: ${{ hashFiles('m6-infra/docker/**/*.Dockerfile') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build the API image
        run: docker build -f m6-infra/docker/api.Dockerfile -t lens/api:ci .

      - name: Trivy image scan (report-only during prototyping)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "lens/api:ci"
          format: "table"
          exit-code: "0" # report-only; flip to 1 to gate
          severity: "CRITICAL,HIGH"
          scanners: "vuln"

      - name: Generate SBOM (CycloneDX) with Trivy
        run: |
          trivy image --format cyclonedx --output sbom.cyclonedx.json lens/api:ci || true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json

# Hardening notes (for when this graduates beyond a prototype):
# - Flip the `|| true` and `exit-code: 0` to hard failures to truly gate.
# - Pin action versions by SHA, not tag.
# - Add branch protection requiring these checks before merge.
