# CodeQL — deep static analysis (security + quality) for Python.
# Complements bandit (fast SAST) with GitHub's semantic code analysis; results
# surface in the repo's Security tab. Free for public repositories.

name: codeql

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "23 6 * * 1" # weekly, so new CodeQL queries catch latent issues

permissions:
  contents: read
  security-events: write # required to upload analysis results

jobs:
  analyze:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: python
          queries: security-and-quality

      - name: Analyze
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
